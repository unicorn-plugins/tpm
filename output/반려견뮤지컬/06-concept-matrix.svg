<svg width="620" height="520" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="520" fill="#f9f9f9"/>

  <!-- 영역 배경 -->
  <rect x="100" y="50" width="225" height="175" fill="#ffcccc" opacity="0.3"/>
  <rect x="325" y="50" width="225" height="175" fill="#ccffcc" opacity="0.4"/>
  <rect x="100" y="225" width="225" height="175" fill="#ffffcc" opacity="0.3"/>
  <rect x="325" y="225" width="225" height="175" fill="#cce5ff" opacity="0.3"/>

  <!-- X축 -->
  <line x1="100" y1="400" x2="550" y2="400" stroke="#333" stroke-width="2"/>
  <!-- Y축 -->
  <line x1="100" y1="400" x2="100" y2="50" stroke="#333" stroke-width="2"/>
  <!-- 중심선 -->
  <line x1="325" y1="50" x2="325" y2="400" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="225" x2="550" y2="225" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 축 레이블 -->
  <text x="325" y="445" text-anchor="middle" font-size="14" fill="#333">제작 실현 가능성 (F표)</text>
  <text x="55" y="225" text-anchor="middle" font-size="14" fill="#333" transform="rotate(-90, 55, 225)">관객 매력도 (A표)</text>

  <!-- 축 눈금 -->
  <text x="100" y="415" text-anchor="middle" font-size="11" fill="#666">0</text>
  <text x="325" y="415" text-anchor="middle" font-size="11" fill="#666">3</text>
  <text x="550" y="415" text-anchor="middle" font-size="11" fill="#666">6</text>
  <text x="88" y="400" text-anchor="end" font-size="11" fill="#666">0</text>
  <text x="88" y="225" text-anchor="end" font-size="11" fill="#666">3</text>
  <text x="88" y="53" text-anchor="end" font-size="11" fill="#666">6</text>

  <!-- 영역명 -->
  <text x="212" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc3333">Big Bets</text>
  <text x="437" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#2d7a2d">No Brainers ⭐</text>
  <text x="212" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#aa8800">Unwise</text>
  <text x="437" y="310" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5faa">Utilities</text>

  <!-- 컨셉 포인트 -->
  <!-- C1: A=4, F=0 → x=100+(0/6)*450=100, y=400-(4/6)*350=167 → Big Bets 영역 -->
  <circle cx="120" cy="167" r="18" fill="#cc3333" opacity="0.85"/>
  <text x="120" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="white">C1</text>

  <!-- C4: A=2, F=2 → x=100+(2/6)*450=250, y=400-(2/6)*350=283 → 중심 근처 (No Brainers 경계) -->
  <circle cx="250" cy="283" r="18" fill="#d4900a" opacity="0.85"/>
  <text x="250" y="288" text-anchor="middle" font-size="12" font-weight="bold" fill="white">C4</text>

  <!-- C5: A=0, F=4 → x=100+(4/6)*450=400, y=400-(0/6)*350=400 → Utilities 영역 -->
  <circle cx="400" cy="385" r="18" fill="#1a5faa" opacity="0.85"/>
  <text x="400" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="white">C5</text>

  <!-- C2: A=0, F=0 → x=100, y=400 → Unwise 영역 -->
  <circle cx="130" cy="370" r="14" fill="#888888" opacity="0.70"/>
  <text x="130" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C2</text>

  <!-- C3: A=0, F=0 → Unwise 영역 근처 -->
  <circle cx="160" cy="355" r="14" fill="#888888" opacity="0.70"/>
  <text x="160" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="white">C3</text>

  <!-- 범례 -->
  <rect x="100" y="460" width="420" height="50" fill="#ffffff" rx="5" stroke="#ddd"/>
  <circle cx="120" cy="480" r="8" fill="#cc3333"/>
  <text x="134" y="484" font-size="11" fill="#333">C1: 감각의 유대</text>
  <circle cx="230" cy="480" r="8" fill="#d4900a"/>
  <text x="244" y="484" font-size="11" fill="#333">C4: 오늘의 사연</text>
  <circle cx="360" cy="480" r="8" fill="#1a5faa"/>
  <text x="374" y="484" font-size="11" fill="#333">C5: 오늘, 산책</text>
  <circle cx="460" cy="480" r="8" fill="#888888"/>
  <text x="474" y="484" font-size="11" fill="#333">C2/C3</text>
</svg>
