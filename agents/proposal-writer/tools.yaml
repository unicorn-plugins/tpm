tools:
  - name: web_search
    description: "웹 검색 — 유사 공연 사례, 기획서 레퍼런스, 업계 동향 검색"
    input: { 검색어 }
    output: { 검색결과 목록 }

  - name: web_fetch
    description: "웹 페이지 내용 가져오기 — 제안서 작성에 필요한 참고 자료 수집"
    input: { URL }
    output: { 페이지 내용 }

  - name: file_read
    description: "파일 읽기 — 선행 분석 결과, 템플릿, 기존 제안서 읽기"
    input: { 파일경로 }
    output: { 파일내용 }

  - name: file_write
    description: "파일 쓰기 — 기획 제안서 및 프레젠테이션 개요 저장"
    input: { 파일경로, 내용 }
    output: { 저장결과 }
